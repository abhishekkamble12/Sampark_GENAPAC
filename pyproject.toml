[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sampark-ai-platform"
version = "0.1.0"
description = "Sampark AI Decision Intelligence Platform — multi-agent, RAG-grounded system on Google Cloud"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "pyjwt",
    "bcrypt",
    "langgraph",
    "langchain",
    "google-cloud-firestore",
    "google-cloud-bigquery",
    "google-cloud-pubsub",
    "google-cloud-storage",
    "httpx",
    "pypdf",
    "python-multipart",
    "google-generativeai"
]
[project.optional-dependencies]
dev = [
    "pytest==8.3.5",
    "hypothesis==6.131.15",
    "pytest-asyncio==0.24.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend", "agents", "tools", "rag"]

[tool.hatch.build.targets.wheel]
packages = ["agents", "backend", "tools", "rag", "functions"]

