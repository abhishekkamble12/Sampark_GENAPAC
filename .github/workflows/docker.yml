name: Docker — Build & Push

on:
  push:
    branches:
      - main
      - version3
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOCKER_IMAGE_NAME: sampark-ai-platform

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/version3' ||
        startsWith(github.ref, 'refs/tags/v')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Smoke test
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          docker run -d \
            --name sampark-test \
            -p 8000:8000 \
            -p 8080:8080 \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:$BRANCH

          echo "Waiting for container..."
          sleep 15

          curl -f http://localhost:8000/health

          docker stop sampark-test
          docker rm sampark-test

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deployment..."
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "Render deploy hook not configured. Skipping."
          fi