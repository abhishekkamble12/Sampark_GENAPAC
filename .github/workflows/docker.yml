# ==============================================================================
# Sampark AI — Docker Image Build & Push
#
# Builds the single unified Docker image for the Sampark AI platform and
# pushes it to Docker Hub whenever code is pushed to main or a version tag.
#
# Required secrets:
#   DOCKER_USERNAME    – Docker Hub username
#   DOCKER_PASSWORD    – Docker Hub access token (or password)
#   VITE_API_BASE_URL  – (optional) Override the default http://localhost:8000
#   RENDER_DEPLOY_HOOK_URL – (optional) Trigger Render deployment
# ==============================================================================

name: Docker — Build & Push

on:
  push:
    branches:
      - main
      - version3
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: sampark-ai-platform

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Test (gate: only proceed to build if tests pass)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (including dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Docker Build & Push (runs after tests, only on main/tags)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/version3' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Set up Docker Buildx (enables multi-platform builds & caching)
      # --------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------
      # Log in to Docker Hub using stored secrets
      # --------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --------------------------------------------------
      # Generate Docker image tags (latest, branch, semver, commit SHA)
      # --------------------------------------------------
      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      # --------------------------------------------------
      # Build and push the multi-stage image
      # --------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # --------------------------------------------------
      # Smoke test — verify the built image starts and responds
      # Uses the branch tag (generated by type=ref,event=branch)
      # --------------------------------------------------
      - name: Smoke test — health endpoint
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          docker run -d --name sampark-test -p 8000:8000 -p 8080:8080 \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:$BRANCH
          echo "Waiting for container to start..."
          sleep 12
          curl -sf http://localhost:8000/health || (docker logs sampark-test 2>&1 && exit 1)
          echo "✅ Health check passed — backend is responding"
          docker stop sampark-test && docker rm sampark-test

      # --------------------------------------------------
      # (Optional) Trigger Render deployment via webhook
      # --------------------------------------------------
      - name: Trigger Render deployment
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"