name: CI/CD — Sampark AI Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Test
# Runs on every push and pull_request to main.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (including dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Build & Push to Artifact Registry
# Runs only on push to main, after tests pass.
# ──────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_ARTIFACT_REGISTRY }} --quiet

      # ── api-gateway ────────────────────────────────────────────────────────
      - name: Build api-gateway image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/api-gateway:${{ github.sha }} \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/api-gateway:latest \
            .

      - name: Push api-gateway image
        run: |
          docker push ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/api-gateway:${{ github.sha }}
          docker push ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/api-gateway:latest

      # ── notification-worker ────────────────────────────────────────────────
      - name: Build notification-worker image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/notification-worker:${{ github.sha }} \
            --tag ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/notification-worker:latest \
            .

      - name: Push notification-worker image
        run: |
          docker push ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/notification-worker:${{ github.sha }}
          docker push ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/notification-worker:latest

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — Deploy to Cloud Run + Cloud Functions
# Runs only on push to main, after images are pushed.
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Cloud Run services ─────────────────────────────────────────────────
      - name: Deploy api-gateway to Cloud Run
        run: |
          gcloud run deploy api-gateway \
            --image ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/api-gateway:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # langgraph-engine removed: ADK pipeline runs inline in api-gateway

      - name: Deploy notification-worker to Cloud Run
        run: |
          gcloud run deploy notification-worker \
            --image ${{ secrets.GCP_ARTIFACT_REGISTRY }}/sampark/notification-worker:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── Cloud Functions ────────────────────────────────────────────────────
      - name: Deploy health-score-function Cloud Function
        run: |
          gcloud functions deploy health-score-function \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --source functions/ \
            --entry-point compute_health_score \
            --runtime python312 \
            --trigger-topic health-score-updated \
            --quiet

      - name: Deploy escalation-scheduler Cloud Function
        run: |
          gcloud functions deploy escalation-scheduler \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --source functions/ \
            --entry-point escalation_scheduler \
            --runtime python312 \
            --trigger-topic task-escalated \
            --quiet
