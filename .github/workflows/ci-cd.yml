name: CI/CD — Sampark AI Platform (FREE Stack)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Test (runs on every push and PR)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (including dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Deploy to free hosting platforms (Render / Railway)
  # Runs only on push to main, after tests pass.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Backend to Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deploy Frontend to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

      - name: Build Docker image (optional — for Docker Hub)
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        run: |
          docker build -t sampark-backend:latest -f backend/Dockerfile .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag sampark-backend:latest ${{ secrets.DOCKER_USERNAME }}/sampark-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sampark-backend:latest
